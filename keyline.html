<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Keyline — Dam Siting Tool</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #1a1a1a; color: #eee;
           height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

    /* ── Header ─────────────────────────────────── */
    #header {
      background: #1e2d1e; padding: 8px 14px; flex-shrink: 0;
      display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
      border-bottom: 2px solid #3a5a3a;
    }
    #header h1 { font-size: 0.95rem; color: #8fbc5a; letter-spacing: 0.05em;
                  font-weight: 600; white-space: nowrap; }

    #search-box { display: flex; gap: 6px; flex: 1; max-width: 320px; }
    #search-input { flex: 1; padding: 5px 10px; border-radius: 5px;
                    border: 1px solid #3a5a3a; background: #111; color: #eee; font-size: 0.82rem; }

    .hdr-btn { padding: 5px 11px; border: 1px solid #3a5a3a; border-radius: 5px;
               background: #2a3a2a; color: #ccc; cursor: pointer; font-size: 0.8rem;
               white-space: nowrap; transition: background 0.15s; }
    .hdr-btn:hover   { background: #3a5a3a; color: #fff; }
    .hdr-btn.active  { background: #4a7a2a; color: #fff; border-color: #8fbc5a; }
    .hdr-btn.primary { background: #4a7a2a; color: #fff; border-color: #4a7a2a; }
    .hdr-btn.primary:hover { background: #5a9a3a; }
    .hdr-btn:disabled { opacity: 0.38; cursor: not-allowed; }

    #base-select { padding: 4px 8px; background: #111; color: #ccc;
                   border: 1px solid #3a5a3a; border-radius: 5px; font-size: 0.8rem; cursor: pointer; }
    .toggle-label { display: flex; align-items: center; gap: 5px;
                    font-size: 0.78rem; color: #aaa; cursor: pointer; white-space: nowrap; }
    .toggle-label input { cursor: pointer; accent-color: #8fbc5a; }
    .sep { width: 1px; height: 22px; background: #3a5a3a; flex-shrink: 0; }

    /* ── Main ───────────────────────────────────── */
    #main { flex: 1; display: flex; overflow: hidden; position: relative; }
    #map  { flex: 1; }

    /* ── Sidebar ────────────────────────────────── */
    #sidebar { width: 275px; flex-shrink: 0; background: #182818;
               border-left: 1px solid #3a5a3a; overflow-y: auto;
               display: none; flex-direction: column; }
    #sidebar.visible { display: flex; }

    #sb-head { padding: 11px 13px; background: #1e2d1e; border-bottom: 1px solid #3a5a3a; flex-shrink: 0; }
    #sb-head h2 { font-size: 0.85rem; color: #8fbc5a; margin-bottom: 3px; }
    #sb-head p  { font-size: 0.7rem; color: #555; }

    .site-card { padding: 9px 13px; border-bottom: 1px solid #222e22; cursor: pointer;
                 transition: background 0.12s; border-left: 3px solid transparent; }
    .site-card:hover    { background: #1e2d1e; }
    .site-card.selected { background: #1e2d1e; border-left-color: #8fbc5a; }

    .sc-title { display: flex; align-items: center; margin-bottom: 5px; gap: 7px; }
    .sc-rank  { display: inline-flex; align-items: center; justify-content: center;
                width: 20px; height: 20px; border-radius: 50%;
                font-size: 0.7rem; font-weight: 700; color: #111; flex-shrink: 0; }
    .sc-name  { font-size: 0.82rem; font-weight: 600; color: #ccc; }
    .sc-score { margin-left: auto; font-size: 0.78rem; color: #8fbc5a; }

    .sc-metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 2px; }
    .sc-m { font-size: 0.68rem; color: #555; }
    .sc-m span { color: #999; }
    .sc-warn { margin-top: 4px; font-size: 0.67rem; color: #c8781a; }

    #export-panel { padding: 11px 13px; border-top: 1px solid #3a5a3a;
                    flex-shrink: 0; background: #1e2d1e; margin-top: auto; }
    #export-panel h3 { font-size: 0.75rem; color: #8fbc5a; margin-bottom: 7px; }
    .exp-btns { display: flex; gap: 6px; flex-wrap: wrap; }
    .exp-btn { padding: 4px 10px; border: 1px solid #3a5a3a; border-radius: 4px;
               background: #2a3a2a; color: #aaa; cursor: pointer; font-size: 0.74rem; }
    .exp-btn:hover { background: #3a5a3a; color: #fff; }

    /* ── Info bar ───────────────────────────────── */
    #info-bar { position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
                background: rgba(20,35,20,0.93); border: 1px solid #3a5a3a;
                border-radius: 6px; padding: 7px 16px; z-index: 1000;
                font-size: 0.8rem; color: #8fbc5a; pointer-events: none;
                display: none; white-space: nowrap; }

    /* ── Legend ─────────────────────────────────── */
    #legend { position: absolute; bottom: 28px; left: 10px; z-index: 1000;
              background: rgba(20,35,20,0.93); border: 1px solid #3a5a3a;
              border-radius: 8px; padding: 10px 13px; font-size: 0.72rem;
              color: #ccc; min-width: 190px; }
    #legend h3 { color: #8fbc5a; margin-bottom: 7px; font-size: 0.77rem; }
    .lg-item  { display: flex; align-items: center; gap: 7px; margin-bottom: 4px; }
    .lg-dot   { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; }
    .lg-line  { width: 22px; height: 2px; flex-shrink: 0; }
    .lg-fill  { width: 14px; height: 14px; flex-shrink: 0; border: 1px dashed; }
    .lg-note  { margin-top: 7px; padding-top: 6px; border-top: 1px solid #2a3a2a;
                font-size: 0.67rem; color: #555; }

    /* ── Zoom slider (from index.html) ─────────── */
    .zoom-slider-control { background: rgba(20,35,20,0.93); border: 1px solid #3a5a3a;
      border-radius: 8px; padding: 8px 6px; display: flex; flex-direction: column;
      align-items: center; gap: 6px; user-select: none; }
    .zoom-slider-control span { font-size: 0.7rem; color: #8fbc5a; font-weight: 600; line-height: 1; }
    .zoom-slider-control input[type=range] { writing-mode: vertical-lr; direction: rtl;
      width: 6px; height: 120px; cursor: pointer; accent-color: #8fbc5a; background: transparent; }
    .zoom-btn { background: #2a4a2a; color: #8fbc5a; border: 1px solid #3a5a3a;
      border-radius: 4px; width: 24px; height: 24px; cursor: pointer;
      font-size: 1rem; line-height: 1; padding: 0; font-weight: 600; }
    .zoom-btn:hover { background: #3a6a3a; }

    /* ── Weights panel ──────────────────────────── */
    #wpanel { display: none; position: absolute; top: 10px; right: 10px; z-index: 1000;
              background: rgba(20,35,20,0.96); border: 1px solid #3a5a3a;
              border-radius: 8px; padding: 12px; min-width: 205px; }
    #wpanel.visible { display: block; }
    #wpanel h3 { font-size: 0.75rem; color: #8fbc5a; margin-bottom: 10px; }
    .wr { margin-bottom: 8px; }
    .wr label { font-size: 0.69rem; color: #aaa; display: flex; justify-content: space-between; margin-bottom: 2px; }
    .wr input[type=range] { width: 100%; accent-color: #8fbc5a; }
    #precip-row { display: flex; align-items: center; gap: 8px; margin-top: 7px;
                  padding-top: 7px; border-top: 1px solid #2a3a2a; }
    #precip-row label { font-size: 0.69rem; color: #aaa; }
    #precip-input { width: 58px; padding: 3px 6px; background: #111;
                    border: 1px solid #3a5a3a; border-radius: 4px; color: #ccc; font-size: 0.74rem; }

    /* Leaflet draw tooltip theming */
    .leaflet-draw-tooltip { background: #1e2d1e !important; color: #8fbc5a !important;
                            border: 1px solid #3a5a3a !important; }
  </style>
</head>
<body>

<div id="header">
  <h1>🌊 Keyline</h1>

  <div id="search-box">
    <input id="search-input" type="text" placeholder="Address or lat,lng…"/>
    <button class="hdr-btn" id="search-btn">Go</button>
  </div>

  <div class="sep"></div>

  <button class="hdr-btn" id="btn-draw">✏ Draw AOI</button>
  <button class="hdr-btn primary" id="btn-analyze" disabled>⚡ Analyze</button>
  <button class="hdr-btn" id="btn-clear" disabled>✕ Clear</button>

  <div class="sep"></div>

  <select id="base-select">
    <option value="osm">Street</option>
    <option value="topo">Topo</option>
    <option value="satellite">Satellite</option>
  </select>

  <label class="toggle-label"><input type="checkbox" id="tog-hillshade" checked/> Hillshade</label>
  <label class="toggle-label"><input type="checkbox" id="tog-streams"   checked/> Streams</label>
  <label class="toggle-label"><input type="checkbox" id="tog-catch"     checked/> Catchments</label>
  <label class="toggle-label"><input type="checkbox" id="tog-route"     checked/> Route</label>

  <button class="hdr-btn" id="btn-weights">⚙ Weights</button>
</div>

<div id="main">
  <div id="map"></div>

  <div id="sidebar">
    <div id="sb-head">
      <h2>Dam Candidate Sites</h2>
      <p id="sb-sub">Ranked by composite score</p>
    </div>
    <div id="site-list"></div>
    <div id="export-panel">
      <h3>Export</h3>
      <div class="exp-btns">
        <button class="exp-btn" id="btn-geojson">GeoJSON</button>
        <button class="exp-btn" id="btn-kml">KML</button>
        <button class="exp-btn" id="btn-pdf">PDF Report</button>
      </div>
    </div>
  </div>
</div>

<div id="info-bar"></div>

<div id="legend">
  <h3>Keyline Sites</h3>
  <div class="lg-item"><div class="lg-dot" style="background:#f1c40f"></div><span>Site #1 (top score)</span></div>
  <div class="lg-item"><div class="lg-dot" style="background:#8bc34a"></div><span>Sites #2–3</span></div>
  <div class="lg-item"><div class="lg-dot" style="background:#4a9db7"></div><span>Sites #4–7</span></div>
  <div class="lg-item"><div class="lg-dot" style="background:#9b6bc4"></div><span>Sites #8–10</span></div>
  <div class="lg-item"><div class="lg-line" style="background:#4a9db7"></div><span>Stream network</span></div>
  <div class="lg-item"><div class="lg-line" style="background:#f1c40f;border-top:2px dashed #f1c40f;background:transparent"></div><span>Access route</span></div>
  <div class="lg-item"><div class="lg-fill" style="background:rgba(74,141,183,0.15);border-color:#4a9db7"></div><span>Catchment (approx.)</span></div>
  <div class="lg-note" id="dem-res-note">DEM: not yet loaded</div>
  <div class="lg-note" style="color:#7a5a1a">⚠ Soil: MVP default (0.7)</div>
</div>

<div id="wpanel">
  <h3>Score Weights</h3>
  <div class="wr"><label>Yield / Earthworks <span id="w1v">0.40</span></label>
    <input type="range" id="w1" min="0" max="1" step="0.05" value="0.4"/></div>
  <div class="wr"><label>Storage / Earthworks <span id="w2v">0.30</span></label>
    <input type="range" id="w2" min="0" max="1" step="0.05" value="0.3"/></div>
  <div class="wr"><label>Soil score <span id="w3v">0.15</span></label>
    <input type="range" id="w3" min="0" max="1" step="0.05" value="0.15"/></div>
  <div class="wr"><label>Elevation bias <span id="w4v">0.15</span></label>
    <input type="range" id="w4" min="0" max="1" step="0.05" value="0.15"/></div>
  <div id="precip-row">
    <label>Annual precip (mm):</label>
    <input type="number" id="precip-input" value="1100" min="100" max="4000"/>
  </div>
</div>

<!-- ── Libraries ─────────────────────────────────────────────────────── -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
<script src="https://cdn.jsdelivr.net/npm/geotiff@2.1.3/dist-browser/geotiff.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>
'use strict';

/* ================================================================
   WORKER SOURCE  (runs via blob URL — no separate file needed)
   ================================================================ */
const WORKER_SRC = `
'use strict';

// ── Directions (E SE S SW W NW N NE) ─────────────────────
const DX   = [1, 1, 0,-1,-1,-1, 0, 1];
const DY   = [0, 1, 1, 1, 0,-1,-1,-1];
const D8   = [1, 2, 4, 8,16,32,64,128];
const SQRT2 = Math.SQRT2;
const NODATA = -9999;

// Direction-code → index lookup (0..255)
const DIR_IDX = new Int8Array(256).fill(-1);
D8.forEach((code, i) => { DIR_IDX[code] = i; });

// ── Min-heap ──────────────────────────────────────────────
class MinHeap {
  constructor() { this._d = []; }
  get size() { return this._d.length; }
  push(p, v) { this._d.push([p,v]); this._up(this._d.length-1); }
  pop()  {
    const top = this._d[0], last = this._d.pop();
    if (this._d.length) { this._d[0] = last; this._dn(0); }
    return top;
  }
  _up(i) {
    const d = this._d;
    while (i > 0) {
      const p = (i-1)>>1;
      if (d[p][0] <= d[i][0]) break;
      const t=d[p]; d[p]=d[i]; d[i]=t; i=p;
    }
  }
  _dn(i) {
    const d=this._d, n=d.length;
    for (;;) {
      let s=i, l=2*i+1, r=2*i+2;
      if (l<n && d[l][0]<d[s][0]) s=l;
      if (r<n && d[r][0]<d[s][0]) s=r;
      if (s===i) break;
      const t=d[s]; d[s]=d[i]; d[i]=t; i=s;
    }
  }
}

// ── Priority-Flood sink filling ────────────────────────────
function fillSinks(elev, W, H) {
  const filled  = new Float32Array(elev);
  const closed  = new Uint8Array(W * H);
  const heap    = new MinHeap();
  const add     = (i) => { if (filled[i] > NODATA+1 && !closed[i]) { closed[i]=1; heap.push(filled[i],i); } };
  for (let x=0; x<W; x++)   { add(x); add((H-1)*W+x); }
  for (let y=1; y<H-1; y++) { add(y*W); add(y*W+W-1); }
  while (heap.size > 0) {
    const [ev, idx] = heap.pop();
    const cx = idx%W, cy = (idx/W)|0;
    for (let d=0; d<8; d++) {
      const nx=cx+DX[d], ny=cy+DY[d];
      if (nx<0||nx>=W||ny<0||ny>=H) continue;
      const ni = ny*W+nx;
      if (closed[ni] || filled[ni]<=NODATA+1) continue;
      closed[ni]=1;
      if (filled[ni] < ev) filled[ni] = ev;
      heap.push(filled[ni], ni);
    }
  }
  return filled;
}

// ── D8 flow direction ──────────────────────────────────────
function flowDir(elev, W, H, csM) {
  const dir = new Uint8Array(W * H);
  for (let y=1; y<H-1; y++) {
    for (let x=1; x<W-1; x++) {
      const idx = y*W+x;
      if (elev[idx] <= NODATA+1) continue;
      let maxDrop=-Infinity, best=-1;
      for (let d=0; d<8; d++) {
        const ni = (y+DY[d])*W+(x+DX[d]);
        if (elev[ni] <= NODATA+1) continue;
        const dist = (d%2===0) ? csM : csM*SQRT2;
        const drop = (elev[idx]-elev[ni])/dist;
        if (drop > maxDrop) { maxDrop=drop; best=d; }
      }
      // flat-area tiebreak → random direction
      if (best < 0) best = (Math.random()*8)|0;
      dir[idx] = D8[best];
    }
  }
  return dir;
}

// ── Flow accumulation ──────────────────────────────────────
function flowAccum(dir, elev, W, H) {
  const n     = W * H;
  const accum = new Float32Array(n).fill(1);
  const idx   = new Uint32Array(n);
  for (let i=0; i<n; i++) idx[i]=i;
  idx.sort((a,b) => elev[b]-elev[a]);   // high → low
  for (const i of idx) {
    const d = DIR_IDX[dir[i]];
    if (d < 0) continue;
    const nx = (i%W)+DX[d], ny = ((i/W)|0)+DY[d];
    if (nx>=0 && nx<W && ny>=0 && ny<H) accum[ny*W+nx] += accum[i];
  }
  return accum;
}

// ── Cell size in metres (lat-corrected average) ────────────
function csMetres(bbox, W, H) {
  const [west,south,east,north] = bbox;
  const midLat = (north+south)/2 * Math.PI/180;
  const csLat  = (north-south)/H * 111320;
  const csLng  = (east-west)/W   * 111320 * Math.cos(midLat);
  return (csLat+csLng)/2;
}

// ── Grid ↔ LatLng ──────────────────────────────────────────
function toLngLat(col, row, bbox, W, H) {
  const [west,,east,north] = bbox;
  return [ west + (col+0.5)/W*(east-west), north - (row+0.5)/H*(bbox[3]-bbox[1]) ];
}

// ── Sample elevation profile along unit vector (pvx,pvy) ──
function sampleProfile(cx, cy, pvx, pvy, elev, W, H, csM, maxSteps) {
  const left=[], right=[];
  for (const sign of [-1,1]) {
    const arr = sign<0 ? left : right;
    for (let r=1; r<=maxSteps; r++) {
      const nx=Math.round(cx+sign*r*pvx), ny=Math.round(cy+sign*r*pvy);
      if (nx<0||nx>=W||ny<0||ny>=H) break;
      const e=elev[ny*W+nx];
      if (e<=NODATA+1) break;
      const diagFactor=(Math.abs(pvx)>0.5&&Math.abs(pvy)>0.5)?SQRT2:1;
      arr.push({ dist: r*csM*diagFactor, elev: e });
      if (e > elev[cy*W+cx]+25) break;
    }
  }
  return { left, right };
}

// ── Valley analysis at a stream cell ──────────────────────
function analyzeValley(cx, cy, elev, dir, W, H, csM, H_wall) {
  const cIdx = cy*W+cx;
  const ce   = elev[cIdx];
  if (ce <= NODATA+1) return null;
  const dc = DIR_IDX[dir[cIdx]];
  if (dc < 0) return null;

  // Perpendicular: rotate flow 90°
  const pvx = -DY[dc], pvy = DX[dc];
  const pmag = Math.sqrt(pvx*pvx+pvy*pvy) || 1;
  const ux = pvx/pmag, uy = pvy/pmag;

  const maxSteps = Math.min(100, Math.ceil(200/csM));
  const { left, right } = sampleProfile(cx, cy, ux, uy, elev, W, H, csM, maxSteps);
  if (left.length < 2 || right.length < 2) return null;

  const wallElev = ce + H_wall;

  const findCross = (arr) => {
    for (let i=1; i<arr.length; i++) {
      if (arr[i-1].elev < wallElev && arr[i].elev >= wallElev) {
        const frac = (wallElev-arr[i-1].elev)/(arr[i].elev-arr[i-1].elev);
        return arr[i-1].dist + frac*(arr[i].dist-arr[i-1].dist);
      }
      if (arr[i].elev >= wallElev) return arr[i].dist;
    }
    return null;
  };

  const ld = findCross(left), rd = findCross(right);
  if (!ld || !rd) return null;

  const wallLength = ld + rd;
  return { wallLength, valleyRatio: H_wall/wallLength };
}

// ── Stream gradient (look-ahead along flow) ────────────────
function streamGrad(cx, cy, elev, dir, W, H, csM, steps) {
  let x=cx, y=cy, dist=0;
  const e0=elev[cy*W+cx];
  for (let i=0; i<steps; i++) {
    const d=DIR_IDX[dir[y*W+x]];
    if (d<0) break;
    const nx=x+DX[d], ny=y+DY[d];
    if (nx<0||nx>=W||ny<0||ny>=H) break;
    dist += (d%2===0) ? csM : csM*SQRT2;
    x=nx; y=ny;
  }
  if (dist<=0) return 0;
  return (e0-elev[y*W+x])/dist;
}

// ── Watershed BFS (check-neighbor approach) ────────────────
function watershed(targetIdx, dir, W, H) {
  const inWS  = new Uint8Array(W*H);
  const queue = [targetIdx];
  inWS[targetIdx] = 1;
  let qi=0;
  while (qi < queue.length) {
    const cur = queue[qi++];
    const cx=cur%W, cy=(cur/W)|0;
    for (let d=0; d<8; d++) {
      const nx=cx+DX[d], ny=cy+DY[d];
      if (nx<0||nx>=W||ny<0||ny>=H) continue;
      const ni=ny*W+nx;
      if (inWS[ni]) continue;
      // Does neighbor flow into current?
      const nd=DIR_IDX[dir[ni]];
      if (nd<0) continue;
      if ((nx+DX[nd])===cx && (ny+DY[nd])===cy) { inWS[ni]=1; queue.push(ni); }
    }
  }
  return inWS;
}

// ── Convex hull (gift-wrapping) ────────────────────────────
function convexHull(pts) {
  if (pts.length < 3) return [...pts, pts[0]||pts[0]];
  let lo=0;
  for (let i=1; i<pts.length; i++) if (pts[i][0]<pts[lo][0]) lo=i;
  const hull=[];
  let cur=lo;
  do {
    hull.push(pts[cur]);
    let next=(cur+1)%pts.length;
    for (let i=0; i<pts.length; i++) {
      const cross=(pts[next][0]-pts[cur][0])*(pts[i][1]-pts[cur][1])
                 -(pts[next][1]-pts[cur][1])*(pts[i][0]-pts[cur][0]);
      if (cross < 0) next=i;
    }
    cur=next;
    if (hull.length > pts.length+1) break;
  } while (cur !== lo);
  hull.push(hull[0]);
  return hull;
}

// ── A* ridge-biased access route ──────────────────────────
function aStar(sx, sy, gx, gy, elev, accum, W, H, csM) {
  const key   = (x,y) => y*W+x;
  const dist  = (x,y) => Math.hypot(x-gx, y-gy);
  let maxA=1;
  for (let i=0; i<accum.length; i++) if (accum[i]>maxA) maxA=accum[i];

  const gScore = new Float32Array(W*H).fill(Infinity);
  const came   = new Int32Array(W*H).fill(-1);
  gScore[key(sx,sy)] = 0;

  const open = new MinHeap();
  open.push(dist(sx,sy), key(sx,sy));

  let iters=0;
  const MAX_ITER = W*H;

  while (open.size>0 && iters++<MAX_ITER) {
    const [,idx] = open.pop();
    const cx=idx%W, cy=(idx/W)|0;
    if (cx===gx && cy===gy) {
      const path=[];
      let c=key(gx,gy);
      while (c!==-1) { path.unshift([c%W,(c/W)|0]); c=came[c]; }
      return path;
    }
    for (let d=0; d<8; d++) {
      const nx=cx+DX[d], ny=cy+DY[d];
      if (nx<0||nx>=W||ny<0||ny>=H) continue;
      const ni=key(nx,ny);
      if (elev[ni]<=NODATA+1) continue;
      const moveDist   = (d%2===0) ? csM : csM*SQRT2;
      const elevDiff   = Math.abs(elev[ni]-elev[idx]);
      const valleyPen  = 1 + 5*(accum[ni]/maxA);  // penalise valleys
      const cost       = moveDist*(1+elevDiff/csM)*valleyPen;
      const ng         = gScore[idx]+cost;
      if (ng < gScore[ni]) {
        gScore[ni]=ng; came[ni]=idx;
        open.push(ng+dist(nx,ny)*csM, ni);
      }
    }
  }
  return null;
}

// ── Main pipeline ──────────────────────────────────────────
self.onmessage = function(e) {
  const { elevation, W, H, bbox, weights, precipMM } = e.data;
  const WALL_H  = 3;       // default wall height m
  const MIN_HA  = 2;       // min catchment ha for a candidate
  const THRESH_HA = 5;     // stream extraction threshold ha

  const csM      = csMetres(bbox, W, H);
  const cellArea = csM * csM;          // m² per pixel
  const threshCells = (THRESH_HA*1e4) / cellArea;
  const precipM  = precipMM / 1000;

  // Sanitise no-data
  const elev = new Float32Array(elevation);
  for (let i=0; i<elev.length; i++) if (elev[i]<-1000||isNaN(elev[i])) elev[i]=NODATA;

  // Elevation range
  let maxE=-Infinity, minE=Infinity;
  for (let i=0; i<elev.length; i++) { if (elev[i]>NODATA+1) { if(elev[i]>maxE)maxE=elev[i]; if(elev[i]<minE)minE=elev[i]; } }
  const eRange=(maxE-minE)||1;

  self.postMessage({ type:'progress', msg:'Filling sinks…' });
  const filled = fillSinks(elev, W, H);

  self.postMessage({ type:'progress', msg:'Computing flow direction…' });
  const dir = flowDir(filled, W, H, csM);

  self.postMessage({ type:'progress', msg:'Computing flow accumulation…' });
  const accum = flowAccum(dir, filled, W, H);

  self.postMessage({ type:'progress', msg:'Extracting stream network…' });

  const streamSegs  = [];
  const streamCells = [];

  for (let y=1; y<H-1; y++) {
    for (let x=1; x<W-1; x++) {
      const idx=y*W+x;
      if (accum[idx]<threshCells || elev[idx]<=NODATA+1) continue;
      streamCells.push([x,y]);
      const d=DIR_IDX[dir[idx]];
      if (d<0) continue;
      const nx=x+DX[d], ny=y+DY[d];
      if (nx<0||nx>=W||ny<0||ny>=H) continue;
      const [lng1,lat1]=toLngLat(x,y,bbox,W,H);
      const [lng2,lat2]=toLngLat(nx,ny,bbox,W,H);
      streamSegs.push([[lng1,lat1],[lng2,lat2]]);
    }
  }

  self.postMessage({ type:'progress', msg:\`Scanning \${streamCells.length} stream cells for candidates…\` });

  const step  = Math.max(1, Math.ceil(8/csM));  // sample every ~8 m along stream
  const cands = [];

  for (let i=0; i<streamCells.length; i+=step) {
    const [cx,cy] = streamCells[i];
    const idx     = cy*W+cx;
    const catchCells = accum[idx];
    const catchHa    = catchCells*cellArea/1e4;
    if (catchHa < MIN_HA) continue;

    const valley = analyzeValley(cx, cy, filled, dir, W, H, csM, WALL_H);
    if (!valley) continue;
    if (valley.wallLength <= 0 || valley.wallLength > 250) continue;
    if (valley.valleyRatio < 0.025) continue;  // too wide/flat

    const grad = streamGrad(cx, cy, filled, dir, W, H, csM, 12);
    if (grad < 0.001 || grad > 0.18) continue;   // too flat or too steep

    const catchM2     = catchCells * cellArea;
    const yield_m3    = catchM2 * 0.35 * precipM;
    const upLen       = Math.sqrt(catchM2) * 0.28;
    const storage_m3  = 0.5 * valley.wallLength * WALL_H * upLen;
    const earth_m3    = 2 * WALL_H * WALL_H * valley.wallLength;
    const elevNorm    = (filled[idx]-minE)/eRange;
    const [lng,lat]   = toLngLat(cx, cy, bbox, W, H);

    cands.push({
      x:cx, y:cy, lat, lng,
      catchmentHa: Math.round(catchHa*10)/10,
      catchM2,
      wallLength:  Math.round(valley.wallLength),
      valleyRatio: valley.valleyRatio,
      storage_m3:  Math.round(storage_m3),
      yield_m3:    Math.round(yield_m3),
      earth_m3:    Math.round(earth_m3),
      elevation:   Math.round(filled[idx]*10)/10,
      gradient:    Math.round(grad*1000)/1000,
      elevNorm,
      permitFlag:  storage_m3 > 61674   // ~50 ac-ft
    });
  }

  self.postMessage({ type:'progress', msg:\`Scoring \${cands.length} candidates…\` });

  if (!cands.length) {
    self.postMessage({ type:'result', sites:[], streams:null, catchments:null, route:null });
    return;
  }

  const { w1,w2,w3,w4 } = weights;
  const SOIL = 0.7;

  // Normalise for scoring
  let maxYE=1e-9, maxSE=1e-9;
  for (const c of cands) {
    const ye=c.yield_m3/(c.earth_m3||1), se=c.storage_m3/(c.earth_m3||1);
    if (ye>maxYE) maxYE=ye;
    if (se>maxSE) maxSE=se;
  }
  let maxEN=1e-9, minEN=1;
  for (const c of cands) { if(c.elevNorm>maxEN)maxEN=c.elevNorm; if(c.elevNorm<minEN)minEN=c.elevNorm; }
  const enRange=(maxEN-minEN)||1;

  for (const c of cands) {
    const ye = c.yield_m3/(c.earth_m3||1)/maxYE;
    const se = c.storage_m3/(c.earth_m3||1)/maxSE;
    const en = (c.elevNorm-minEN)/enRange;
    c.score = Math.round((w1*ye + w2*se + w3*SOIL + w4*en)*100)/100;
  }

  cands.sort((a,b)=>b.score-a.score);

  // Cluster: remove anything within 50m of a better site
  const topSites=[];
  const clDist = 50/csM;
  for (const c of cands) {
    const near = topSites.some(s=>{const dx=c.x-s.x,dy=c.y-s.y; return Math.sqrt(dx*dx+dy*dy)<clDist;});
    if (!near) topSites.push(c);
    if (topSites.length>=10) break;
  }

  // Catchments (top 5)
  self.postMessage({ type:'progress', msg:'Delineating catchments…' });
  const catchFeatures=[];
  for (let i=0; i<Math.min(5,topSites.length); i++) {
    const s=topSites[i];
    const ws=watershed(s.y*W+s.x, dir, W, H);
    const pts=[];
    const stride=Math.max(1,Math.ceil(ws.length/800));
    for (let idx=0; idx<ws.length; idx+=stride) {
      if (ws[idx]) { const [lng,lat]=toLngLat(idx%W,(idx/W)|0,bbox,W,H); pts.push([lng,lat]); }
    }
    if (pts.length>=4) {
      catchFeatures.push({
        type:'Feature',
        properties:{ rank:i+1 },
        geometry:{ type:'Polygon', coordinates:[convexHull(pts)] }
      });
    }
  }

  // Access route
  self.postMessage({ type:'progress', msg:'Computing access route…' });
  let routeCoords=null;
  if (topSites.length>=2) {
    const routePts=[];
    const nR=Math.min(3,topSites.length);
    for (let i=0; i<nR-1; i++) {
      const s1=topSites[i], s2=topSites[i+1];
      const path=aStar(s1.x,s1.y,s2.x,s2.y,filled,accum,W,H,csM);
      if (path) {
        for (const [px,py] of path) {
          const [lng,lat]=toLngLat(px,py,bbox,W,H);
          routePts.push([lng,lat]);
        }
      }
    }
    if (routePts.length>1) routeCoords={
      type:'Feature',
      geometry:{ type:'LineString', coordinates:routePts },
      properties:{ label:'Ridge access route (top-3 sites)' }
    };
  }

  self.postMessage({
    type:'result',
    sites: topSites,
    streams: streamSegs.length ? { type:'Feature', geometry:{ type:'MultiLineString', coordinates:streamSegs }, properties:{} } : null,
    catchments: { type:'FeatureCollection', features:catchFeatures },
    route: routeCoords
  });
};
`;

// ── Zoom slider (ported from index.html) ─────────────────
const ZoomSlider = L.Control.extend({
  options:{ position:'topleft' },
  onAdd(m) {
    const [MIN,MAX]=[1,25];
    const div=L.DomUtil.create('div','zoom-slider-control');
    L.DomEvent.disableClickPropagation(div);
    L.DomEvent.disableScrollPropagation(div);
    const bp=L.DomUtil.create('button','zoom-btn',div); bp.textContent='+';
    const sl=L.DomUtil.create('input','',div);
    sl.type='range'; sl.min=MIN; sl.max=MAX; sl.step=1; sl.value=m.getZoom();
    const lb=L.DomUtil.create('span','',div); lb.textContent=m.getZoom();
    const bm=L.DomUtil.create('button','zoom-btn',div); bm.textContent='−';
    const set=v=>{ const z=Math.max(MIN,Math.min(MAX,v)); m.setZoom(z); sl.value=z; lb.textContent=z; };
    bp.onclick=()=>set(+sl.value+1); bm.onclick=()=>set(+sl.value-1);
    sl.oninput=()=>set(+sl.value);
    m.on('zoomend',()=>{ sl.value=m.getZoom(); lb.textContent=m.getZoom(); });
    return div;
  }
});

// ── Search ───────────────────────────────────────────────
document.getElementById('search-btn').addEventListener('click', doSearch);
document.getElementById('search-input').addEventListener('keydown', e => { if (e.key==='Enter') doSearch(); });

function doSearch() {
  const v = document.getElementById('search-input').value.trim(); if (!v) return;
  const ll = v.match(/^(-?\d+\.?\d*)[,\s]+(-?\d+\.?\d*)$/);
  if (ll) { flyTo(+ll[1],+ll[2],v); return; }
  showInfo('Searching…');
  fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(v)}&limit=1`)
    .then(r=>r.json()).then(rs=>{
      if (!rs.length) { showInfo('Not found'); setTimeout(hideInfo,3000); return; }
      flyTo(+rs[0].lat,+rs[0].lon,rs[0].display_name);
    }).catch(()=>{ showInfo('Search failed'); setTimeout(hideInfo,3000); });
}
function flyTo(lat,lng,label) {
  map.flyTo([lat,lng],14);
  showInfo(label.slice(0,70));
  setTimeout(hideInfo,3000);
}

// ── Render results ────────────────────────────────────────
function renderResults(data) {
  const { sites, streams, catchments, route } = data;
  lastData = data;

  if (streams)
    lStreams = L.geoJSON(streams, { style:{ color:'#4a9db7', weight:1.5, opacity:0.6 } }).addTo(map);

  if (catchments && catchments.features.length)
    lCatch = L.geoJSON(catchments, {
      style: f => ({ color:COLORS[f.properties.rank-1], weight:1.5, fillOpacity:0.13, dashArray:'5 4' })
    }).addTo(map);

  if (route)
    lRoute = L.geoJSON(route, { style:{ color:'#f1c40f', weight:2.5, opacity:0.82, dashArray:'8 5' } }).addTo(map);

  const list = document.getElementById('site-list');
  list.innerHTML = '';

  sites.forEach((s, i) => {
    const rank = i+1;
    const mk = L.marker([s.lat, s.lng], { icon:siteIcon(rank) })
      .addTo(map).bindPopup(sitePopup(s, rank));
    lMarkers.push(mk);

    const card = document.createElement('div');
    card.className='site-card';
    card.innerHTML=`
      <div class="sc-title">
        <span class="sc-rank" style="background:${COLORS[i]}">${rank}</span>
        <span class="sc-name">Site ${rank}</span>
        <span class="sc-score">${s.score.toFixed(2)}</span>
      </div>
      <div class="sc-metrics">
        <div class="sc-m">Catchment: <span>${s.catchmentHa} ha</span></div>
        <div class="sc-m">Yield/yr: <span>${fmt(s.yield_m3)} m³</span></div>
        <div class="sc-m">Storage: <span>${fmt(s.storage_m3)} m³</span></div>
        <div class="sc-m">Wall: <span>${s.wallLength} m</span></div>
        <div class="sc-m">Earthworks: <span>${fmt(s.earth_m3)} m³</span></div>
        <div class="sc-m">Elevation: <span>${s.elevation} m</span></div>
      </div>
      ${s.permitFlag ? '<div class="sc-warn">⚠ May exceed 50 ac-ft — check permit thresholds</div>' : ''}`;
    card.addEventListener('click', ()=>{
      map.flyTo([s.lat,s.lng],16); mk.openPopup();
      document.querySelectorAll('.site-card').forEach(c=>c.classList.remove('selected'));
      card.classList.add('selected');
    });
    list.appendChild(card);
  });

  document.getElementById('sidebar').classList.add('visible');
  document.getElementById('sb-sub').textContent = `${sites.length} site${sites.length!==1?'s':''} · click to zoom`;
  if (drawn.getLayers().length) map.fitBounds(drawn.getBounds(), { padding:[40,40] });
}

function sitePopup(s, rank) {
  const w = s.permitFlag ? '<br><span style="color:#c8781a">⚠ Est. storage may exceed 50 ac-ft permit threshold</span>' : '';
  return `<div style="font-family:'Segoe UI',sans-serif;font-size:13px;min-width:185px">
    <strong style="color:#8fbc5a">Site #${rank}</strong> &nbsp; Score: <strong>${s.score.toFixed(2)}</strong>
    <hr style="border-color:#333;margin:5px 0"/>
    <table style="width:100%;font-size:12px;border-collapse:collapse">
      <tr><td>Catchment</td><td style="text-align:right">${s.catchmentHa} ha</td></tr>
      <tr><td>Annual yield</td><td style="text-align:right">${fmt(s.yield_m3)} m³/yr</td></tr>
      <tr><td>Est. storage</td><td style="text-align:right">${fmt(s.storage_m3)} m³</td></tr>
      <tr><td>Wall length</td><td style="text-align:right">${s.wallLength} m</td></tr>
      <tr><td>Earthworks</td><td style="text-align:right">${fmt(s.earth_m3)} m³</td></tr>
      <tr><td>Elevation</td><td style="text-align:right">${s.elevation} m</td></tr>
      <tr><td>Gradient</td><td style="text-align:right">${(s.gradient*100).toFixed(1)}%</td></tr>
    </table>
    <small style="color:#777">⚠ Soil: estimated default · verify on site</small>${w}</div>`;
}

function fmt(n) {
  if (n>=1e6) return (n/1e6).toFixed(1)+'M';
  if (n>=1e3) return (n/1e3).toFixed(1)+'k';
  return Math.round(n)+'';
}

// ── Analyze ───────────────────────────────────────────────
document.getElementById('btn-analyze').addEventListener('click', runAnalysis);

async function runAnalysis() {
  const layers = drawn.getLayers();
  if (!layers.length) { showInfo('Draw a property boundary first.'); return; }

  const aoi    = layers[0].toGeoJSON();
  const bounds = layers[0].getBounds();
  const acreage = turf.area(aoi) / 4046.86;
  if (acreage > 500 && !confirm(`AOI is ~${Math.round(acreage)} acres (>${500} ac). Analysis may be slow in the browser. Continue?`)) return;

  // Buffer bbox by 500 m
  const lat0=bounds.getSouth(), lat1=bounds.getNorth();
  const lng0=bounds.getWest(),  lng1=bounds.getEast();
  const midLat=(lat0+lat1)/2;
  const dLat=0.5/111.32;
  const dLng=0.5/(111.32*Math.cos(midLat*Math.PI/180));
  const [west,south,east,north]=[lng0-dLng, lat0-dLat, lng1+dLng, lat1+dLat];

  // Choose DEM size: larger grid for smaller areas → better resolution
  const spanKm = Math.max((east-west)*111.32*Math.cos(midLat*Math.PI/180),(north-south)*111.32);
  const demPx  = spanKm<1.5?1024 : spanKm<3?768 : spanKm<6?512 : 384;

  showInfo('Fetching DEM from USGS 3DEP…');
  document.getElementById('btn-analyze').disabled=true;

  try {
    const demUrl =
      `https://elevation.nationalmap.gov/arcgis/rest/services/3DEPElevation/ImageServer/exportImage` +
      `?bbox=${west},${south},${east},${north}&bboxSR=4326&imageSR=4326` +
      `&size=${demPx},${demPx}&format=tiff&f=image`;

    const resp = await fetch(demUrl);
    if (!resp.ok) throw new Error(`3DEP response ${resp.status} — try a smaller AOI or check network.`);
    const buf = await resp.arrayBuffer();

    showInfo('Decoding elevation data…');
    const tiff  = await GeoTIFF.fromArrayBuffer(buf);
    const image = await tiff.getImage();
    const rasts = await image.readRasters();
    const elevation = new Float32Array(rasts[0]);
    const W = image.getWidth(), H = image.getHeight();

    // Bounding box from GeoTIFF metadata (may differ slightly from request)
    let bbox = [west, south, east, north];
    try {
      const ib = image.getBoundingBox();
      if (ib && ib.length===4 && Math.abs(ib[0]-west)<1) bbox=ib;
    } catch(_) {}

    // Display DEM resolution
    const csLat = (bbox[3]-bbox[1])/H*111320;
    const csLng = (bbox[2]-bbox[0])/W*111320*Math.cos((bbox[1]+bbox[3])/2*Math.PI/180);
    const resM  = (csLat+csLng)/2;
    document.getElementById('dem-res-note').textContent = `DEM: ~${resM.toFixed(1)} m/px · USGS 3DEP`;

    showInfo('Running hydrology pipeline…');

    // Terminate any previous worker
    if (activeWorker) activeWorker.terminate();
    activeWorker = new Worker(workerUrl);

    activeWorker.onmessage = e => {
      const { type, msg, sites, streams, catchments, route } = e.data;
      if (type==='progress') { showInfo(msg); return; }
      // result
      document.getElementById('btn-analyze').disabled=false;
      activeWorker=null;
      if (!sites || !sites.length) {
        showInfo('No dam candidates found — try a larger or hillier AOI, or reduce stream threshold.');
        setTimeout(hideInfo, 6000);
        return;
      }
      showInfo(`Found ${sites.length} candidate site${sites.length!==1?'s':''}.`);
      setTimeout(hideInfo, 3500);
      renderResults({ sites, streams, catchments, route });
    };

    activeWorker.onerror = err => {
      showInfo('Pipeline error: '+err.message);
      document.getElementById('btn-analyze').disabled=false;
      console.error(err);
    };

    // Transfer buffer to worker (zero-copy)
    const elevCopy = new Float32Array(elevation);
    activeWorker.postMessage(
      { elevation:elevCopy, W, H, bbox, weights:weights(), precipMM:+document.getElementById('precip-input').value },
      [elevCopy.buffer]
    );

  } catch(err) {
    showInfo('Error: '+err.message);
    document.getElementById('btn-analyze').disabled=false;
    console.error(err);
  }
}

// ── Export ────────────────────────────────────────────────
document.getElementById('btn-geojson').addEventListener('click', () => {
  if (!lastData) return;
  const { sites, streams, catchments, route } = lastData;
  const fc = {
    type:'FeatureCollection',
    features:[
      ...sites.map((s,i)=>({ type:'Feature',
        geometry:{ type:'Point', coordinates:[s.lng,s.lat] },
        properties:{ rank:i+1, score:s.score, catchment_ha:s.catchmentHa,
          yield_m3_yr:s.yield_m3, storage_m3:s.storage_m3,
          wall_length_m:s.wallLength, earthworks_m3:s.earth_m3,
          elevation_m:s.elevation, gradient_pct:(s.gradient*100).toFixed(1) } })),
      ...(streams?[streams]:[]),
      ...(route?[route]:[]),
      ...(catchments?catchments.features:[])
    ]
  };
  dl('keyline-sites.geojson', JSON.stringify(fc,null,2), 'application/geo+json');
});

document.getElementById('btn-kml').addEventListener('click', () => {
  if (!lastData) return;
  const marks = lastData.sites.map((s,i)=>`
  <Placemark>
    <name>Site ${i+1} (score ${s.score})</name>
    <description>Catchment ${s.catchmentHa}ha | Yield ${fmt(s.yield_m3)}m³/yr | Storage ${fmt(s.storage_m3)}m³ | Wall ${s.wallLength}m</description>
    <Point><coordinates>${s.lng},${s.lat},${s.elevation}</coordinates></Point>
  </Placemark>`).join('');
  dl('keyline-sites.kml',
    `<?xml version="1.0" encoding="UTF-8"?>\n<kml xmlns="http://www.opengis.net/kml/2.2">\n<Document><name>Keyline Dam Sites</name>${marks}\n</Document>\n</kml>`,
    'application/vnd.google-earth.kml+xml');
});

document.getElementById('btn-pdf').addEventListener('click', async () => {
  if (!lastData || !lastData.sites.length) return;
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation:'portrait', unit:'mm', format:'a4' });
  const W=210, M=16;

  // Cover
  doc.setFillColor(30,45,30); doc.rect(0,0,W,40,'F');
  doc.setTextColor(143,188,90); doc.setFontSize(18);
  doc.text('Keyline Dam Siting Report', M, 22);
  doc.setFontSize(9); doc.setTextColor(150,150,150);
  doc.text(`Generated ${new Date().toLocaleDateString()}  ·  USGS 3DEP  ·  ${document.getElementById('dem-res-note').textContent}`, M, 33);

  const top3 = lastData.sites.slice(0,3);
  top3.forEach((s,i) => {
    if (i>0) doc.addPage();
    doc.setFillColor(30,45,30); doc.rect(0,42,W,15,'F');
    doc.setTextColor(143,188,90); doc.setFontSize(13);
    doc.text(`Site ${i+1}  —  Composite Score ${s.score.toFixed(2)}`, M, 52);

    let y=65;
    doc.setTextColor(90,90,90); doc.setFontSize(9);
    doc.text(`${s.lat.toFixed(5)}°N, ${Math.abs(s.lng).toFixed(5)}°W  ·  Elevation ${s.elevation} m`, M, y); y+=9;

    doc.setFontSize(10.5);
    const rows=[
      ['Catchment area',  `${s.catchmentHa} ha`],
      ['Annual yield (est.)', `${fmt(s.yield_m3)} m³/yr`],
      ['Est. storage',    `${fmt(s.storage_m3)} m³`],
      ['Wall length',     `${s.wallLength} m`],
      ['Earthworks est.', `${fmt(s.earth_m3)} m³`],
      ['Stream gradient', `${(s.gradient*100).toFixed(1)}%`],
    ];
    rows.forEach(([lbl,val])=>{
      doc.setTextColor(80,80,80); doc.text(lbl, M, y);
      doc.setTextColor(20,20,20); doc.text(val, 140, y);
      y+=7.5;
    });

    y+=4; doc.setDrawColor(143,188,90); doc.line(M,y,W-M,y); y+=6;
    doc.setFontSize(8.5); doc.setTextColor(100,100,100);
    doc.text('⚠  Soil suitability: estimated default (0.7/1.0) — verify via SSURGO or on-site probe.', M, y); y+=5;
    doc.text('⚠  Yield and storage are model estimates. Runoff coeff 0.35; annual precip per user setting.', M, y); y+=5;
    if (s.permitFlag) {
      doc.setTextColor(170,100,20);
      doc.text('⚠  Est. storage may exceed 50 ac-ft — review state dam permit thresholds before proceeding.', M, y); y+=5;
    }
    doc.setTextColor(100,100,100);
    doc.text('Next steps: site visit · soil probe · survey cross-section · consult licensed engineer.', M, y);
  });

  doc.save('keyline-report.pdf');
});

function dl(name, content, mime) {
  const a=Object.assign(document.createElement('a'),
    { href:URL.createObjectURL(new Blob([content],{type:mime})), download:name });
  a.click();
}

// ── Info bar helpers ──────────────────────────────────────
function showInfo(msg) { const b=document.getElementById('info-bar'); b.textContent=msg; b.style.display='block'; }
function hideInfo()    { document.getElementById('info-bar').style.display='none'; }
